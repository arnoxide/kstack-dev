services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kstack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kstack

  # ── Database migrations (runs once then exits) ──────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: pnpm db:push
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kstack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kstack}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kstack

  # ── API server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kstack-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-kstack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kstack}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      API_PORT: 3001
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kstack

volumes:
  postgres_data:

networks:
  kstack:
    driver: bridge
